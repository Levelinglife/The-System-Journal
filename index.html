<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D0C0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>The System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400;1,9..40,500&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script>
    // One-time cleanup: nuke old stale service workers and caches
    // This runs BEFORE React loads to break the stale cache cycle
    (function() {
      var CLEANUP_VERSION = 'v3'; // Bump this to force another cleanup
      if (localStorage.getItem('sw-cleanup') !== CLEANUP_VERSION) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(reg) { reg.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
        localStorage.setItem('sw-cleanup', CLEANUP_VERSION);
        // Reload once to get fresh content after clearing caches
        if (!sessionStorage.getItem('sw-reloaded')) {
          sessionStorage.setItem('sw-reloaded', '1');
          location.reload();
        }
      }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
